<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row 1: Evidence categories -->
  <!-- Strong unbelief (red) -->
  <rect x="20" y="30" width="116" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="78" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#791F1F">Strong unbelief</text>

  <!-- Weak unbelief (coral) -->
  <rect x="152" y="30" width="116" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="210" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#712B13">Weak unbelief</text>

  <!-- Mixed evidence (gray) -->
  <rect x="284" y="30" width="116" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="342" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">Mixed evidence</text>

  <!-- Weak belief (teal) -->
  <rect x="416" y="30" width="116" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="474" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Weak belief</text>

  <!-- Strong belief (green) -->
  <rect x="548" y="30" width="116" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="606" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Strong belief</text>

  <!-- Arrows row 1 → row 2 -->
  <line x1="78"  y1="74" x2="78"  y2="150" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="74" x2="210" y2="150" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="342" y1="74" x2="342" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="474" y1="74" x2="474" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="606" y1="74" x2="606" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Assurance -->
  <!-- Unsure (gray) -->
  <rect x="284" y="140" width="116" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="342" y="161" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">Unsure about</text>
  <text x="342" y="180" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">salvation</text>

  <!-- Weak assurance (teal) -->
  <rect x="416" y="140" width="116" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="474" y="161" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Weak assurance</text>
  <text x="474" y="180" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">of salvation</text>

  <!-- Strong assurance (green) -->
  <rect x="548" y="140" width="116" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="606" y="161" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Strong assurance</text>
  <text x="606" y="180" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">of salvation</text>

  <!-- Arrows row 2 → row 3 -->
  <line x1="78"  y1="150" x2="78"  y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="150" x2="210" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="342" y1="196" x2="342" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="474" y1="196" x2="474" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="606" y1="196" x2="606" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Verdict -->
  <!-- Unsaved (red) -->
  <rect x="20" y="290" width="248" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="144" y="325" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Unsaved</text>

  <!-- Mixed verdict (gray) -->
  <rect x="284" y="290" width="116" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="342" y="325" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">—</text>

  <!-- Saved (green) -->
  <rect x="416" y="290" width="248" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="540" y="325" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Saved</text>
</svg>
